name: Build Unsigned armeabi-v7a APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version label (e.g. v7.0.0)"
        required: false
        default: "dev"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-v7a:
    name: Build unsigned armeabi-v7a APK
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Remove Nix-specific Java home from gradle.properties
        run: sed -i '/org\.gradle\.java\.home/d' gradle.properties

      - name: Write stub google-services.json
        run: |
          cat > app/google-services.json << 'EOF'
          {
            "project_info": { "project_id": "stub", "project_number": "0" },
            "client": [{
              "client_info": { "mobilesdk_app_id": "1:0:android:stub" },
              "api_key": [{ "current_key": "stub" }]
            }],
            "configuration_version": "1"
          }
          EOF

      - name: Write stub client_secrets.json
        run: |
          mkdir -p app/src/main/assets
          echo '{}' > app/src/main/assets/client_secrets.json

      - name: Build armeabi-v7a release APK (unsigned)
        run: ./gradlew assembleArmeabiV7aRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      - name: Rename APK
        run: |
          APK=$(find app/build/outputs/apk/armeabiV7a/release -name "*.apk" | head -1)
          DEST="Anikku-armeabi-v7a-${{ github.event.inputs.version_name }}-unsigned.apk"
          cp "$APK" "$DEST"
          echo "APK_NAME=$DEST" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Anikku-armeabi-v7a-${{ github.event.inputs.version_name }}-unsigned
          path: ${{ env.APK_NAME }}
          retention-days: 30
