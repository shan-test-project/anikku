name: Build Stable armeabi-v7a APK
# Manually triggered build that compiles and signs an armeabi-v7a release APK
# and uploads it as a downloadable workflow artifact.

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version label for the artifact (e.g. v7.0.0)"
        required: false
        default: "dev"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-v7a:
    name: Build armeabi-v7a release APK
    runs-on: ubuntu-24.04

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Java ────────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      # ── Gradle cache ────────────────────────────────────────────────────────
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # ── Google services (optional — write a stub if the secret is absent) ───
      - name: Write google-services.json
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          elif [ ! -f app/google-services.json ]; then
            # Stub so Gradle does not fail; telemetry is disabled anyway.
            cat > app/google-services.json <<'EOF'
          {
            "project_info": { "project_id": "stub", "project_number": "0" },
            "client": [{
              "client_info": { "mobilesdk_app_id": "1:0:android:stub" },
              "api_key": [{ "current_key": "stub" }]
            }],
            "configuration_version": "1"
          }
          EOF
          fi
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      # ── Client secrets (optional) ────────────────────────────────────────────
      - name: Write client_secrets.json
        run: |
          mkdir -p app/src/main/assets
          if [ -n "$GOOGLE_CLIENT_SECRETS_JSON" ]; then
            echo "$GOOGLE_CLIENT_SECRETS_JSON" > app/src/main/assets/client_secrets.json
          elif [ ! -f app/src/main/assets/client_secrets.json ]; then
            echo '{}' > app/src/main/assets/client_secrets.json
          fi
        env:
          GOOGLE_CLIENT_SECRETS_JSON: ${{ secrets.GOOGLE_CLIENT_SECRETS_JSON }}

      # ── Build only armeabi-v7a ───────────────────────────────────────────────
      - name: Build armeabi-v7a release APK
        run: |
          ./gradlew assembleArmeabiV7aRelease \
            -Pandroid.injected.signing.store.file="" \
            --no-daemon --stacktrace
        # Disable telemetry/updater so the fork builds without upstream secrets.
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      # ── Sign APK (only if signing secrets are present) ──────────────────────
      - name: Sign APK
        if: ${{ secrets.SIGNING_KEY != '' }}
        id: sign
        uses: r0adkll/sign-android-release@f30bdd30588842ac76044ecdbd4b6d0e3e813478
        with:
          releaseDirectory: app/build/outputs/apk/armeabiV7a/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.1"

      # ── Rename for clarity ───────────────────────────────────────────────────
      - name: Rename APK
        run: |
          VERSION="${{ github.event.inputs.version_name }}"
          OUT=app/build/outputs/apk/armeabiV7a/release

          # Pick signed variant if it exists, otherwise unsigned.
          APK=$(find "$OUT" -name "*signed*.apk" | head -1)
          [ -z "$APK" ] && APK=$(find "$OUT" -name "*.apk" | head -1)

          DEST="Anikku-armeabi-v7a-${VERSION}.apk"
          cp "$APK" "$DEST"
          echo "APK_PATH=$DEST" >> $GITHUB_ENV
          sha256sum "$DEST"

      # ── Upload artifact ──────────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Anikku-armeabi-v7a-${{ github.event.inputs.version_name }}
          path: ${{ env.APK_PATH }}
          retention-days: 30
